<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Blood Test - Sri Kamala Hospital</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f5faff 60%, #ffeaea 100%);
      color: #222;
      min-height: 100vh;
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    /* Navbar Styling - Modern, Soft, and Animated */
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(90deg, #e53935 0%, #63c6ec 60%, #a0eecb 100%);
      padding: 26px 0 20px 0;
      box-shadow: 0 4px 24px rgba(229,57,53,0.08), 0 2px 12px rgba(0,0,0,0.04);
      border-radius: 0 0 28px 28px;
      position: relative;
      z-index: 10;
      animation: navbarSlide 1s cubic-bezier(.77,0,.18,1);
      overflow: visible;
    }
    @keyframes navbarSlide {
      from { opacity: 0; transform: translateY(-60px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .navbar .logo {
      display: flex;
      align-items: center;
      font-size: 2.2em;
      color: #fff;
      font-weight: 800;
      letter-spacing: 1.5px;
      margin-right: 38px;
      text-shadow: 0 4px 16px rgba(229,57,53,0.10), 0 2px 8px rgba(0,0,0,0.07);
      transition: text-shadow 0.3s;
      position: relative;
      animation: pulseLogo 2.5s infinite;
    }
    @keyframes pulseLogo {
      0%, 100% { text-shadow: 0 4px 16px #e5393533, 0 2px 8px #0001; }
      50% { text-shadow: 0 8px 32px #e5393555, 0 4px 16px #0002; }
    }
    .navbar .logo img {
      height: 44px;
      margin-right: 14px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(229,57,53,0.12), 0 2px 8px rgba(0,0,0,0.08);
      background: #fff;
      padding: 3px;
      border: 2px solid #e53935;
      animation: bloodDropLogo 2.5s infinite;
    }
    @keyframes bloodDropLogo {
      0%, 100% { transform: translateY(0);}
      60% { transform: translateY(4px);}
      80% { transform: translateY(-2px);}
    }
    .nav-links {
      display: flex;
      gap: 0;
      list-style: none;
      background: rgba(255,255,255,0.13);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(229,57,53,0.04), 0 2px 8px rgba(0,0,0,0.03);
      padding: 0 12px;
      margin: 0;
      align-items: center;
      position: relative;
      overflow: visible;
    }
    .nav-links li {
      margin: 0 4px;
      position: relative;
    }
    .nav-links a {
      color: #fff;
      margin: 0 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.13em;
      letter-spacing: 0.7px;
      transition: 
        color 0.3s, 
        text-shadow 0.3s, 
        background 0.25s, 
        box-shadow 0.25s;
      position: relative;
      padding: 10px 22px 10px 22px;
      border-radius: 10px;
      display: inline-block;
      overflow: visible;
    }
    .nav-links a::after {
      content: '';
      display: block;
      position: absolute;
      left: 50%;
      bottom: 6px;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #e53935 0%, #00b894 100%);
      border-radius: 2px;
      transition: width 0.3s, left 0.3s;
      z-index: 1;
    }
    .nav-links a:hover::after, .nav-links a:focus::after {
      width: 60%;
      left: 20%;
    }
    .nav-links a:hover, .nav-links a:focus {
      background: #fff;
      color: #e53935;
      text-shadow: 0 2px 8px rgba(229,57,53,0.10);
      box-shadow: 0 2px 12px rgba(229,57,53,0.07);
      outline: none;
      animation: navLinkPulse 0.5s;
    }
    @keyframes navLinkPulse {
      0% { box-shadow: 0 0 0 0 #e5393533; }
      100% { box-shadow: 0 0 0 8px #e5393500; }
    }

    /* Animated blood drop on navbar right */
    .navbar::after {
      content: '';
      display: block;
      position: absolute;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 32px;
      background: radial-gradient(circle at 60% 30%, #fff 10%, #e53935 80%);
      border-radius: 50% 50% 60% 60% / 60% 60% 100% 100%;
      box-shadow: 0 4px 16px #e5393533;
      animation: bloodDropFloat 2.5s infinite;
      z-index: 2;
    }
    @keyframes bloodDropFloat {
      0%, 100% { transform: translateY(-50%) scale(1);}
      50% { transform: translateY(-60%) scale(1.08);}
    }

    /* Responsive Navbar */
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
        padding: 16px 0 12px 0;
        border-radius: 0 0 18px 18px;
      }
      .navbar .logo {
        justify-content: center;
        margin: 0 0 12px 0;
        font-size: 1.4em;
      }
      .nav-links {
        flex-direction: column;
        align-items: stretch;
        padding: 6px 0;
        border-radius: 12px;
        width: 100%;
        box-shadow: none;
      }
      .nav-links a {
        padding: 12px 0;
        margin: 0 0 4px 0;
        border-radius: 0;
        text-align: center;
      }
      .navbar::after {
        right: 12px;
        top: 18px;
        width: 16px;
        height: 22px;
      }
    }

    /* Booking Section - Blood Test Theme */
    .booking-section {
      max-width: 650px;
      margin: 48px auto 40px auto;
      background: linear-gradient(120deg, #fff 80%, #ffeaea 100%);
      border-radius: 18px;
      padding: 38px 36px 32px 36px;
      box-shadow: 0 8px 32px rgba(229,57,53,0.10), 0 0 20px rgba(0,0,0,0.08);
      animation: fadeInUp 1s cubic-bezier(.7,0,.3,1);
      position: relative;
      overflow: visible;
    }
    .booking-section::before {
      content: '';
      position: absolute;
      left: -32px;
      top: -32px;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 60% 30%, #fff 10%, #e53935 80%);
      border-radius: 50% 50% 60% 60% / 60% 60% 100% 100%;
      opacity: 0.18;
      z-index: 0;
      animation: bloodDropFloat 2.5s infinite;
    }
    .booking-section::after {
      content: '';
      position: absolute;
      right: -24px;
      bottom: -24px;
      width: 38px;
      height: 38px;
      background: radial-gradient(circle at 60% 30%, #fff 10%, #00b894 80%);
      border-radius: 50% 50% 60% 60% / 60% 60% 100% 100%;
      opacity: 0.13;
      z-index: 0;
      animation: bloodDropFloat 2.5s 1.2s infinite;
    }
    .booking-section h2 {
      text-align: center;
      margin-bottom: 28px;
      color: #e53935;
      font-size: 2.1em;
      font-weight: 800;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      animation: bloodTextPulse 2.5s infinite;
    }
    @keyframes bloodTextPulse {
      0%, 100% { text-shadow: 0 2px 8px #e5393533; }
      50% { text-shadow: 0 6px 24px #e5393555; }
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 1.2s cubic-bezier(.7,0,.3,1);
    }
    form label {
      font-weight: 700;
      color: #e53935;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
      display: block;
      transition: color 0.3s;
    }
    form input,
    form select {
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1.08em;
      background: #fff;
      transition: border 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 8px rgba(229,57,53,0.03);
      outline: none;
    }
    form input:focus,
    form select:focus {
      border: 1.5px solid #e53935;
      box-shadow: 0 0 0 2px #e5393533;
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 4px;
    }
    .checkbox-grid label {
      background: linear-gradient(90deg, #ffeaea 60%, #f5faff 100%);
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      color: #b71c1c;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(229,57,53,0.03);
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: visible;
    }
    .checkbox-grid input[type="checkbox"] {
      accent-color: #e53935;
      width: 18px;
      height: 18px;
      margin-right: 6px;
      transition: accent-color 0.3s;
    }
    .checkbox-grid label:hover,
    .checkbox-grid input[type="checkbox"]:focus + label {
      background: #e5393522;
      color: #e53935;
      box-shadow: 0 2px 12px #e5393533;
    }

    /* Custom radio buttons for gender */
    form input[type="radio"] {
      accent-color: #e53935;
      margin-right: 6px;
      width: 16px;
      height: 16px;
      vertical-align: middle;
      transition: accent-color 0.3s;
    }
    form label[for="gender"] {
      margin-bottom: 0;
    }
    .gender-group {
      display: flex;
      gap: 16px;
      margin-top: 4px;
      align-items: center;
    }
    .gender-group label {
      font-weight: 600;
      color: #b71c1c;
    }
    /* MISSING BRACKET FIXED ABOVE */

    .main-btn {
      padding: 12px;
      background: #00b894;
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      font-size: 1.08em;
      margin-top: 10px;
      box-shadow: 0 2px 8px #00b89422;
    }
    .main-btn:hover, .main-btn:focus {
      background: #00997a;
      outline: none;
    }

    /* Token Box */
    .token-box {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #e0f7fa;
      animation: fadeInUp 0.6s ease;
    }
    .checkmark {
      font-size: 40px;
      color: #2ecc71;
      animation: pop 0.4s ease;
    }
    .token-number {
      font-size: 24px;
      font-weight: bold;
      color: #00796b;
      margin-top: 5px;
    }
    .success-msg {
      color: #00b894;
      font-size: 1.2em;
      font-weight: 700;
      margin-top: 10px;
      margin-bottom: 4px;
      text-align: center;
    }
    .token-text {
      color: #e53935;
      font-size: 1.05em;
      margin-top: 8px;
      margin-bottom: 2px;
      text-align: center;
    }

    /* Blood Test Loading Card */
    .bloodtest-loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.92);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s;
      opacity: 1;
      pointer-events: all;
    }
    .bloodtest-loading-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 36px 32px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 320px;
      min-height: 340px;
      position: relative;
      animation: fadeInUp 0.6s;
    }
    .bloodtest-loading-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #d32f2f;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .bloodtest-loading-svg {
      width: 180px;
      height: 180px;
      margin-bottom: 18px;
      display: block;
    }
    .bloodtest-loading-text {
      font-size: 1.08rem;
      color: #444;
      text-align: center;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 0.1px;
    }
    /* SVG Animations */
    .hand-arm {
      transform-origin: 90px 120px;
      animation: handMove 5s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes handMove {
      0% { transform: translateY(0px);}
      10% { transform: translateY(0px);}
      20% { transform: translateY(0px);}
      30% { transform: translateY(0px);}
      40% { transform: translateY(0px);}
      50% { transform: translateY(0px);}
      60% { transform: translateY(0px);}
      70% { transform: translateY(0px);}
      80% { transform: translateY(0px);}
      90% { transform: translateY(0px);}
      100% { transform: translateY(0px);}
    }
    .syringe-group {
      transform-origin: 90px 80px;
      animation: syringeMove 5s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes syringeMove {
      0% { transform: translateY(-60px);}
      10% { transform: translateY(-40px);}
      20% { transform: translateY(-20px);}
      30% { transform: translateY(0px);}
      40% { transform: translateY(0px);}
      50% { transform: translateY(0px);}
      60% { transform: translateY(0px);}
      70% { transform: translateY(0px);}
      80% { transform: translateY(0px);}
      90% { transform: translateY(0px);}
      100% { transform: translateY(0px);}
    }
    .blood-drop {
      opacity: 0;
      animation: bloodDropAnim 5s linear forwards;
    }
    @keyframes bloodDropAnim {
      0% { opacity: 0; transform: translateY(0);}
      30% { opacity: 0; }
      40% { opacity: 1; transform: translateY(0);}
      60% { opacity: 1; transform: translateY(30px);}
      80% { opacity: 0; transform: translateY(60px);}
      100% { opacity: 0; transform: translateY(60px);}
    }
    .blood-fill {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: bloodFillAnim 5s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes bloodFillAnim {
      0% { stroke-dashoffset: 80;}
      35% { stroke-dashoffset: 80;}
      45% { stroke-dashoffset: 60;}
      60% { stroke-dashoffset: 0;}
      100% { stroke-dashoffset: 0;}
    }
    .bloodtest-loading-overlay[hidden] {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* Chatbot */
    #chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00aaff;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 2px 8px #00aaff33;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #chat-toggle:hover, #chat-toggle:focus {
      background: #0077cc;
      box-shadow: 0 4px 16px #00aaff44;
      outline: none;
    }
    #chatbot {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: #fff;
      border: 2px solid #00aaff;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 999;
      overflow: hidden;
    }
    .chat-header {
      background: #00aaff;
      color: #fff;
      padding: 10px;
      font-weight: bold;
      text-align: center;
      font-size: 1.1em;
      letter-spacing: 0.5px;
    }
    .chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f8fafd;
      font-size: 1em;
    }
    .chat-msg {
      margin-bottom: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #e3f2fd;
      color: #222;
      max-width: 90%;
      word-break: break-word;
      font-size: 0.98em;
    }
    .chat-msg strong {
      color: #00aaff;
      margin-right: 4px;
    }
    .chat-footer {
      display: flex;
      border-top: 1px solid #ccc;
      background: #f5faff;
      padding: 6px;
      gap: 4px;
    }
    .chat-footer input {
      flex: 1;
      padding: 8px;
      border: 1px solid #b2ebf2;
      border-radius: 6px;
      font-size: 1em;
      outline: none;
      background: #fff;
      transition: border 0.2s;
    }
    .chat-footer input:focus {
      border: 1.5px solid #00aaff;
    }
    .chat-footer button {
      padding: 8px 12px;
      background: #00aaff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1em;
      transition: background 0.2s;
    }
    .chat-footer button:hover, .chat-footer button:focus {
      background: #0077cc;
      outline: none;
    }

    /* Animations */
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .booking-section {
        margin: 20px 10px;
        padding: 20px;
      }
      .nav-links {
        flex-direction: column;
        align-items: center;
      }
      .bloodtest-loading-card {
        min-width: 90vw;
        min-height: 300px;
        padding: 18px 5vw 18px 5vw;
      }
      .bloodtest-loading-svg {
        width: 120px;
        height: 120px;
      }
      #chatbot {
        width: 95vw;
        right: 2vw;
        min-width: unset;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="ChatGPT Image Apr 19, 2025, 01_22_02 AM.png" alt="Sri Kamala Logo" />
      Sri Kamala Hospital
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="appoinment.html">Book Appointment</a></li>
      <li><a href="diagnosis.html">Diagnosis</a></li>
    </ul>
  </nav>

  <!-- Booking Section -->
  <section class="booking-section">
    <h2>Book Blood Test</h2>
    <form id="bloodTestForm">
      <label for="patientName">Name*</label>
      <input type="text" id="patientName" name="patientName" required placeholder="Enter your name" />

      <label for="email">Email*</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Phone Number*</label>
      <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" maxlength="10" placeholder="10-digit number" />

      <label for="age">Age*</label>
      <input type="number" id="age" name="age" min="1" max="120" required />

      <label>Gender*</label>
      <div class="gender-group">
        <label><input type="radio" name="gender" value="Male" required /> Male</label>
        <label><input type="radio" name="gender" value="Female" /> Female</label>
        <label><input type="radio" name="gender" value="Other" /> Other</label>
      </div>

      <label>Select Tests Required*</label>
      <div class="checkbox-grid">
        <label><input type="checkbox" name="tests" value="Hemoglobin" /> Hemoglobin</label>
        <label><input type="checkbox" name="tests" value="Blood Glucose" /> Blood Glucose</label>
        <label><input type="checkbox" name="tests" value="Lipid Profile" /> Lipid Profile</label>
        <label><input type="checkbox" name="tests" value="Thyroid Profile" /> Thyroid Profile</label>
        <label><input type="checkbox" name="tests" value="Vitamin D" /> Vitamin D</label>
        <label><input type="checkbox" name="tests" value="CBC" /> CBC</label>
        <label><input type="checkbox" name="tests" value="Liver Function" /> Liver Function</label>
        <label><input type="checkbox" name="tests" value="Kidney Function" /> Kidney Function</label>
        <label><input type="checkbox" name="tests" value="Electrolytes" /> Electrolytes</label>
        <label><input type="checkbox" name="tests" value="Vitamin B12" /> Vitamin B12</label>
      </div>

      <button type="submit" class="main-btn">Book Test</button>
    </form>

    <div class="token-box" id="tokenBox">
      <div class="checkmark">✔</div>
      <div class="success-msg">Booking Successful!</div>
      <div class="token-text">Your token number is:</div>
      <div class="token-number" id="tokenNumber"></div>
    </div>
  </section>

  <!-- Blood Test Loading Card (hidden by default) -->
  <div class="bloodtest-loading-overlay" id="bloodtestLoadingOverlay" hidden>
    <div class="bloodtest-loading-card">
      <div class="bloodtest-loading-title">Booking Your Blood Test...</div>
      <svg class="bloodtest-loading-svg" viewBox="0 0 180 180" fill="none">
        <!-- Arm/Hand -->
        <g class="hand-arm">
          <ellipse cx="90" cy="140" rx="55" ry="18" fill="#ffe0b2" opacity="0.25"/>
          <rect x="60" y="110" width="60" height="30" rx="15" fill="#ffe0b2" />
          <rect x="80" y="120" width="20" height="40" rx="10" fill="#ffe0b2" />
          <!-- Palm -->
          <ellipse cx="90" cy="165" rx="18" ry="10" fill="#ffd180"/>
          <!-- Fingers -->
          <ellipse cx="80" cy="170" rx="4" ry="8" fill="#ffd180"/>
          <ellipse cx="90" cy="172" rx="4" ry="8" fill="#ffd180"/>
          <ellipse cx="100" cy="170" rx="4" ry="8" fill="#ffd180"/>
        </g>
        <!-- Syringe -->
        <g class="syringe-group">
          <!-- Barrel -->
          <rect x="85" y="40" width="10" height="50" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
          <!-- Plunger -->
          <rect x="87" y="25" width="6" height="20" rx="3" fill="#b0bec5"/>
          <rect x="83" y="20" width="14" height="7" rx="3.5" fill="#b0bec5"/>
          <!-- Needle -->
          <rect x="89" y="90" width="2" height="22" rx="1" fill="#90caf9"/>
          <!-- Blood in barrel (animated) -->
          <rect x="85" y="80" width="10" height="10" rx="5" fill="#e53935" />
          <rect x="85" y="90" width="10" height="0" rx="5" fill="#e53935" class="blood-fill" />
          <!-- Blood drop (animated) -->
          <ellipse class="blood-drop" cx="90" cy="115" rx="5" ry="8" fill="#e53935" />
        </g>
      </svg>
      <div class="bloodtest-loading-text">
        Please wait while we process your booking and generate your token.<br>
        <span style="color:#e53935;font-weight:600;">Blood sample is being collected...</span>
      </div>
    </div>
  </div>

  <!-- Chatbot -->
  <button id="chat-toggle" title="Chat with us">💬</button>
  <div id="chatbot">
    <div class="chat-header">Chatbot</div>
    <div class="chat-body" id="chatBody"></div>
    <form class="chat-footer" id="chatForm">
      <input type="text" id="chatInput" placeholder="Ask something..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- Script -->
  <script>
  let tokenCounter = localStorage.getItem('kamalaDiaToken');
  tokenCounter = tokenCounter ? parseInt(tokenCounter) + 1 : 1;

  // Show/hide blood test loading overlay
  function showBloodTestLoading() {
    const overlay = document.getElementById('bloodtestLoadingOverlay');
    overlay.hidden = false;
    overlay.style.opacity = "1";
  }
  function hideBloodTestLoading() {
    const overlay = document.getElementById('bloodtestLoadingOverlay');
    overlay.style.opacity = "0";
    setTimeout(() => { overlay.hidden = true; }, 350);
  }

  document.getElementById("bloodTestForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const name = document.getElementById("patientName").value.trim();
    const gender = document.querySelector('input[name="gender"]:checked')?.value;
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const age = document.getElementById("age").value.trim();
    const checkboxes = document.querySelectorAll('input[name="tests"]:checked');
    const selectedTests = Array.from(checkboxes).map(cb => cb.value);

    if (!name || !gender || !phone || !email || !age || selectedTests.length === 0) {
      alert("Please fill in all fields and select at least one test.");
      return;
    }

    // Show blood test loading animation
    showBloodTestLoading();

    const token = `KAMALA(DIA):${String(tokenCounter).padStart(3, '0')}`;
    localStorage.setItem('kamalaDiaToken', tokenCounter);
    localStorage.setItem('dxToken', token);
    localStorage.setItem('dxName', name);
    localStorage.setItem('dxGender', gender);
    localStorage.setItem('dxPhone', phone);
    localStorage.setItem('dxEmail', email);
    localStorage.setItem('dxAge', age);
    localStorage.setItem('dxTests', JSON.stringify(selectedTests));

    // Save to backend
    try {
      await fetch("https://hospital-backend-78ur.onrender.com/save-diagnosis", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token,
          name,
          gender,
          phone,
          email,
          age,
          tests: selectedTests
        })
      });

      // Wait for 5 seconds to finish the animation, then redirect
      setTimeout(() => {
        hideBloodTestLoading();
        window.location.href = "bloodtestreceipt.html";
      }, 5000);

    } catch (err) {
      hideBloodTestLoading();
      console.error("Error saving diagnosis:", err);
      alert("❌ Failed to save booking. Please try again later.");
    }
  });

  // Chatbot toggle
  document.getElementById("chat-toggle").addEventListener("click", () => {
    const chatbot = document.getElementById("chatbot");
    chatbot.style.display = chatbot.style.display === "flex" ? "none" : "flex";
  });

  // Chatbot logic (basic, for demo)
  let chatVisible = false;
  function addMessage(sender, message) {
    const chat = document.getElementById("chatBody");
    const bubble = document.createElement("div");
    bubble.className = "chat-msg";
    bubble.innerHTML = `<strong>${sender}:</strong> ${message}`;
    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
  }
  function botReply(message) {
    addMessage("Bot", message);
  }
  function getBotResponse(input) {
    const msg = input.toLowerCase();
    if (msg.includes("bookop") || msg.includes("appointment")) {
      return 'You can book an appointment <a href="appoinment.html" target="_blank">here</a>.';
    }
    if (msg.includes("time") || msg.includes("timing")) {
      return "We are open from <strong>8AM to 8PM</strong>, all 7 days.";
    }
    if (msg.includes("doctor")) {
      return 'You can view our doctors <a href="doctors.html" target="_blank">here</a>.';
    }
    if (msg.includes("location") || msg.includes("where")) {
      return "We are located at <strong>123 Health Road, YourCity</strong>.";
    }
    if (msg.includes("blood test")) {
      return 'You can book blood tests <a href="bloodtestbook.html" target="_blank">here</a>.';
    }
    if (msg.includes("emergency")) {
      return "Please call our emergency line: <strong>+91-XXXXXXXXXX</strong>";
    }
    if (msg.includes("contact")) {
      return 'You can contact us via the form <a href="contact.html" target="_blank">here</a>.';
    }
    return "Sorry, I didn’t understand that. Can you rephrase?";
  }
  document.getElementById("chatForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if (!msg) return;
    addMessage("You", msg);
    input.value = "";
    setTimeout(() => botReply(getBotResponse(msg)), 800);
  });
  </script>

</body>
</html>
