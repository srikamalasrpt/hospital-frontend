<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Kamala Hospital - Appointment Booking</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a76d2;
    --secondary: #34a853;
    --accent: #f37e21;
    --text: #333333;
    --light-bg: #f5f7fa;
    --shadow: 0 8px 20px rgba(0,0,0,0.1);
    --transition: all 0.3s cubic-bezier(.77,0,.18,1);
    --pulse: #e3f2fd;
    --success: #34a853;
    --error: #e53935;
}

/* Reset and base styles */
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    margin: 0;
    overflow-x: hidden;
}

/* Navbar Styles & Animation */
.navbar {
    width: 100%;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px) saturate(120%);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    box-shadow: 0 6px 24px 0 rgba(26,118,210,0.10), 0 1.5px 6px 0 rgba(52,168,83,0.08);
    position: fixed;
    top: 0;
    left: 0;
    z-index: 999;
    animation: navbarSlideDown 1s cubic-bezier(.77,0,.18,1) forwards;
    transition: background 0.3s, box-shadow 0.3s;
}
@keyframes navbarSlideDown {
    0% { transform: translateY(-60px) scaleY(0.95); opacity: 0; }
    60% { transform: translateY(10px) scaleY(1.03); opacity: 1; }
    100% { transform: translateY(0) scaleY(1); opacity: 1; }
}
.navbar .logo {
    font-size: 1.7rem;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: 1.5px;
    text-shadow: 0 2px 12px #e3f2fd;
    animation: logoBounceIn 1.2s cubic-bezier(.77,0,.18,1) 0.2s backwards;
    cursor: pointer;
    user-select: none;
    transition: color 0.3s;
}
.navbar .logo:hover {
    color: var(--accent);
    text-shadow: 0 4px 16px var(--accent), 0 2px 12px #e3f2fd;
    animation: logoPulse 0.7s;
}
@keyframes logoBounceIn {
    0% { transform: scale(0.7) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
}
@keyframes logoPulse {
    0% { text-shadow: 0 0 0 var(--accent);}
    100% { text-shadow: 0 0 18px var(--accent);}
}
.navbar ul {
    list-style: none;
    display: flex;
    gap: 36px;
    align-items: center;
}
.navbar ul li {
    position: relative;
}
.navbar ul li a {
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    font-size: 1.08rem;
    padding: 8px 18px;
    border-radius: 24px;
    transition: 
        color 0.25s cubic-bezier(.77,0,.18,1),
        background 0.25s cubic-bezier(.77,0,.18,1),
        transform 0.25s cubic-bezier(.77,0,.18,1);
    position: relative;
    overflow: hidden;
    z-index: 1;
}
.navbar ul li a::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    background: linear-gradient(90deg, var(--primary) 60%, var(--accent) 100%);
    border-radius: 24px;
    z-index: 0;
    transition: all 0.35s cubic-bezier(.77,0,.18,1);
    transform: translate(-50%, -50%);
    opacity: 0.12;
}
.navbar ul li a:hover::before,
.navbar ul li a:focus::before {
    width: 120%;
    height: 220%;
    opacity: 0.22;
}
.navbar ul li a::after {
    content: '';
    display: block;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    transition: width 0.35s cubic-bezier(.77,0,.18,1);
    position: absolute;
    left: 18px;
    bottom: 6px;
    border-radius: 2px;
    z-index: 2;
}
.navbar ul li a:hover,
.navbar ul li a:focus {
    color: var(--primary);
    background: rgba(243,126,33,0.07);
    transform: scale(1.08) translateY(-2px);
    outline: none;
}
.navbar ul li a:hover::after,
.navbar ul li a:focus::after {
    width: 60%;
}
.navbar ul li.active a,
.navbar ul li a.active {
    color: var(--accent);
    background: rgba(243,126,33,0.13);
    font-weight: 800;
}
.navbar ul li.active a::after,
.navbar ul li a.active::after {
    width: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
}

/* Hamburger for mobile (hidden by default) */
.navbar .hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 38px;
    height: 38px;
    cursor: pointer;
    z-index: 1001;
    margin-left: 18px;
    background: none;
    border: none;
    outline: none;
    transition: background 0.2s;
}
.navbar .hamburger span {
    display: block;
    width: 26px;
    height: 3.5px;
    margin: 4px 0;
    background: var(--primary);
    border-radius: 2px;
    transition: all 0.35s cubic-bezier(.77,0,.18,1);
}
.navbar .hamburger.active span:nth-child(1) {
    transform: translateY(7.5px) rotate(45deg);
}
.navbar .hamburger.active span:nth-child(2) {
    opacity: 0;
}
.navbar .hamburger.active span:nth-child(3) {
    transform: translateY(-7.5px) rotate(-45deg);
}

/* Responsive Navbar */
@media (max-width: 900px) {
    .navbar {
        padding: 14px 5vw;
    }
    .navbar ul {
        gap: 18px;
    }
}
@media (max-width: 768px) {
    .navbar {
        flex-direction: row;
        padding: 12px 2vw;
        min-height: 60px;
    }
    .navbar .logo {
        font-size: 1.2rem;
    }
    .navbar .hamburger {
        display: flex;
    }
    .navbar ul {
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100vw;
        background: rgba(255,255,255,0.98);
        box-shadow: 0 8px 32px 0 rgba(26,118,210,0.10);
        padding: 18px 0 12px 0;
        gap: 0;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-20px) scaleY(0.98);
        transition: all 0.35s cubic-bezier(.77,0,.18,1);
        z-index: 1000;
    }
    .navbar ul.open {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scaleY(1);
        animation: navbarMenuDrop 0.5s cubic-bezier(.77,0,.18,1);
    }
    @keyframes navbarMenuDrop {
        0% { opacity: 0; transform: translateY(-30px) scaleY(0.95);}
        100% { opacity: 1; transform: translateY(0) scaleY(1);}
    }
    .navbar ul li {
        width: 100%;
        text-align: center;
        margin: 0;
    }
    .navbar ul li a {
        display: block;
        width: 100%;
        padding: 14px 0;
        font-size: 1.08rem;
        border-radius: 0;
        background: none;
        border-bottom: 1px solid #f0f0f0;
        margin: 0;
    }
    .navbar ul li:last-child a {
        border-bottom: none;
    }
}
@media (max-width: 480px) {
    .navbar {
        padding: 8px 1vw;
    }
    .navbar .logo {
        font-size: 1.05rem;
    }
    .navbar ul li a {
        font-size: 0.98rem;
        padding: 12px 0;
    }
}

/* Container and rest of styles (unchanged) */
.container {
    background: #fff;
    border-radius: 30px;
    box-shadow: 0 12px 40px 0 rgba(26,118,210,0.10), 0 1.5px 6px 0 rgba(52,168,83,0.08);
    max-width: 700px;
    width: 100%;
    padding: 40px;
    margin: 120px auto 40px auto;
    animation: fadeInUp 1.2s cubic-bezier(.77,0,.18,1) forwards;
    position: relative;
    overflow: hidden;
}
@keyframes fadeInUp {
    0% { opacity:0; transform: translateY(60px) scale(0.98); }
    100% { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes logoImgPop {
    0% { opacity:0; transform: scale(0.8) rotate(-5deg); }
    100% { opacity:1; transform: scale(1) rotate(0); }
}
.container::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle at 60% 40%, var(--primary) 0%, transparent 80%);
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
    animation: floatBlob 8s ease-in-out infinite alternate;
}
@keyframes floatBlob {
    0% { transform: scale(1) translateY(0);}
    100% { transform: scale(1.1) translateY(20px);}
}
header { text-align:center; margin-bottom:30px; position: relative; z-index: 1;}
header h1 { 
    font-size:2rem; 
    color: var(--primary); 
    margin-bottom:10px; 
    animation: fadeInDown 1.2s cubic-bezier(.77,0,.18,1) forwards; 
    letter-spacing: 1px;
    text-shadow: 0 2px 8px #e3f2fd;
}
@keyframes fadeInDown {
    0% { opacity:0; transform: translateY(-20px) scale(0.95);}
    100% { opacity:1; transform: translateY(0) scale(1);}
}
.card { 
    padding: 20px; 
    background: rgba(255,255,255,0.98);
    border-radius: 18px;
    box-shadow: 0 2px 12px 0 rgba(52,168,83,0.07);
    position: relative;
    z-index: 1;
    animation: cardPop 1.2s cubic-bezier(.77,0,.18,1) 0.2s backwards;
}
@keyframes cardPop {
    0% { opacity:0; transform: scale(0.95);}
    100% { opacity:1; transform: scale(1);}
}
.form-title {
    text-align: center;
    font-size: 1.8rem;
    color: var(--primary);
    margin-bottom: 25px;
    position: relative;
    letter-spacing: 1px;
    animation: pulseTitle 2.5s infinite alternate;
}
@keyframes pulseTitle {
    0% { text-shadow: 0 0 0 var(--accent);}
    100% { text-shadow: 0 0 12px var(--accent);}
}
.form-title::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    border-radius: 2px;
    animation: underlineSlide 2s infinite alternate;
}
@keyframes underlineSlide {
    0% { width: 60px;}
    100% { width: 100px;}
}
.form-group { 
    margin-bottom: 20px; 
    position: relative; 
    z-index: 1;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--primary);
    transition: var(--transition);
    letter-spacing: 0.5px;
    opacity: 0.95;
}
.form-control {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    transition: var(--transition);
    outline: none;
    background: #f8f9fa;
    position: relative;
    z-index: 1;
    box-shadow: 0 1.5px 6px 0 rgba(26,118,210,0.04);
}
.form-control:focus {
    border-color: var(--accent);
    box-shadow: 0 4px 16px 0 rgba(243,126,33,0.18), 0 0 0 2px var(--pulse);
    background: #fff;
    animation: inputPulse 0.7s;
}
@keyframes inputPulse {
    0% { box-shadow: 0 0 0 0 var(--pulse);}
    100% { box-shadow: 0 0 0 6px transparent;}
}
.form-group input:valid, .form-group select:valid, .form-group textarea:valid {
    border-color: var(--secondary);
    background: #f1f8e9;
    transition: border-color 0.4s, background 0.4s;
}
.form-group input:invalid:focus, .form-group select:invalid:focus, .form-group textarea:invalid:focus {
    border-color: var(--error);
    background: #ffebee;
}
.row { display: flex; flex-wrap: wrap; gap: 20px; }
.col { flex: 1; min-width: 250px; }
.btn {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    width: 100%;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px 0 rgba(26,118,210,0.10);
    z-index: 1;
    animation: btnPop 1.2s cubic-bezier(.77,0,.18,1) 0.4s backwards;
}
@keyframes btnPop {
    0% { opacity:0; transform: scale(0.9);}
    100% { opacity:1; transform: scale(1);}
}
.btn::before {
    content: '';
    position: absolute;
    width: 0;
    height: 100%;
    top: 0;
    left: 0;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    transition: width 0.4s cubic-bezier(.77,0,.18,1);
    z-index: 0;
    opacity: 0.7;
}
.btn:hover::before { width: 100%; }
.btn span { position: relative; z-index: 1; }
.btn:hover { 
    transform: translateY(-2px) scale(1.04) rotate(-1deg);
    box-shadow: 0 6px 24px 0 rgba(243,126,33,0.18);
}
.text-center { text-align: center; }

/* Appointment Success Animation */
#appointmentSuccess {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0; top: 0;
    width: 100vw; height: 100vh;
    background: rgba(52,168,83,0.12);
    align-items: center;
    justify-content: center;
    animation: fadeInScale 0.7s cubic-bezier(.77,0,.18,1) forwards;
}
#appointmentSuccess .success-content {
    background: #fff;
    border-radius: 24px;
    padding: 40px 30px;
    box-shadow: 0 8px 32px 0 rgba(52,168,83,0.18);
    text-align: center;
    animation: popSuccess 0.8s cubic-bezier(.77,0,.18,1) forwards;
    position: relative;
}
@keyframes popSuccess {
    0% { transform: scale(0.7) rotate(-8deg); opacity: 0;}
    80% { transform: scale(1.08) rotate(2deg); opacity: 1;}
    100% { transform: scale(1) rotate(0);}
}
.success-checkmark {
    width: 70px; height: 70px;
    margin: 0 auto 18px auto;
    display: block;
}
.success-checkmark svg {
    width: 100%; height: 100%;
    display: block;
}
.success-checkmark .circle {
    stroke: var(--success);
    stroke-width: 6;
    fill: none;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: drawCircle 0.7s cubic-bezier(.77,0,.18,1) 0.1s forwards;
}
.success-checkmark .check {
    stroke: var(--success);
    stroke-width: 6;
    fill: none;
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: drawCheck 0.5s cubic-bezier(.77,0,.18,1) 0.6s forwards;
}
@keyframes drawCircle {
    to { stroke-dashoffset: 0; }
}
@keyframes drawCheck {
    to { stroke-dashoffset: 0; }
}
.success-content h2 {
    color: var(--success);
    margin-bottom: 10px;
    font-size: 1.5rem;
    letter-spacing: 1px;
}
.success-content p {
    color: var(--text);
    font-size: 1.1rem;
    margin-bottom: 0;
}

/* Modal */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0;
    width: 100%; height: 100%; 
    overflow: auto;
    background-color: rgba(0,0,0,0.6); 
    animation: fadeInScale 0.5s cubic-bezier(.77,0,.18,1) forwards;
}
.modal-content {
    background-color: #fff;
    margin: 15% auto; 
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    animation: fadeInScale 0.5s cubic-bezier(.77,0,.18,1) forwards;
}
@keyframes fadeInScale {
    0% { opacity:0; transform: scale(0.7);}
    100% { opacity:1; transform: scale(1);}
}
.modal h3 { margin-bottom: 25px; }
.modal .modal-btn {
    margin: 10px 0;
    padding: 12px 20px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
}
.modal-btn:hover { opacity: 0.9; }
.pay-hospital { background: var(--secondary); color: #fff; }
.pay-online { background: var(--accent); color: #fff; }

/* Responsive Styles for Container and Form */
@media (max-width: 1024px) {
    .container {
        max-width: 95vw;
        padding: 25px;
    }
}
@media (max-width: 900px) {
    .container {
        max-width: 98vw;
        padding: 15px;
    }
}
@media (max-width: 768px) {
    .row { flex-direction: column; gap: 0; }
    .container {
        margin: 100px 10px 30px 10px;
        padding: 10px;
        border-radius: 12px;
    }
    .form-title {
        font-size: 1.3rem;
    }
    header h1 {
        font-size: 1.3rem;
    }
    .card {
        padding: 10px;
    }
    .form-control {
        font-size: 15px;
        padding: 10px 12px;
    }
    .btn {
        font-size: 15px;
        padding: 12px 10px;
    }
    .modal-content, .modal-content-3d {
        padding: 15px;
        max-width: 98vw;
    }
    #appointmentSuccess .success-content {
        padding: 20px 10px;
    }
}
@media (max-width: 480px) {
    .container {
        margin: 80px 2px 10px 2px;
        padding: 5px;
        border-radius: 8px;
    }
    .form-title {
        font-size: 1.05rem;
    }
    header h1 {
        font-size: 1.05rem;
    }
    .card {
        padding: 5px;
    }
    .form-control {
        font-size: 14px;
        padding: 8px 8px;
    }
    .btn {
        font-size: 14px;
        padding: 10px 5px;
    }
    .modal-content, .modal-content-3d {
        padding: 8px;
        max-width: 99vw;
    }
    .modal-front, .modal-back {
        padding: 8px;
    }
    #appointmentSuccess .success-content {
        padding: 10px 2px;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" role="navigation" aria-label="Main Navigation">
    <div class="logo">Sri Kamala Hospital</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="bloodtestbook.html">Blood Test(రక్త పరీక్ష)</a></li>
        <li><a href="doctors.html">Doctors</a></li>
    </ul>
</nav>

<main>
<div class="container">
    <header>
      <img src="ChatGPT Image Apr 19, 2025, 01_22_02 AM.png" style="width: 100px; max-width: 100%; height: auto; animation: logoImgPop 1.2s cubic-bezier(.77,0,.18,1) 0.1s backwards;">
        <h1>Sri Kamala Hospital</h1>
    </header>
    <div class="card">
        <h2 class="form-title">Book Your Appointment</h2>
        <br>
        <form id="appointmentForm" autocomplete="off">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="fullName">Full Name-పూర్తి పేరు</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Full name-(మీ పూర్తి పేరు)" required>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="phone">Phone Number-ఫోన్ నంబర్</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Phone number-(ఫోన్ నంబర్)" required pattern="[0-9]{10,}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="age">Age-వయస్సు</label>
                        <input type="number" id="age" class="form-control" placeholder="Enter your age-(మీ వయస్సు)" required min="1" max="120">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="gender">Gender-లింగం</label>
                        <select id="gender" class="form-control" required>
                            <option value="">Gender-లింగం</option>
                            <option value="male">Male(పురుషుడు)</option>
                            <option value="female">Female(మహిళ)</option>
                            <option value="other">Other(ఇతర)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="role">Role-వైద్య రోల్</label>
                        <select id="role" class="form-control" required>
                            <option value="">Role -రోల్ ఎంచుకోండి</option>
                            <option value="general">General Physician(జనరల్ ఫిజీషియన్)</option>
                            <option value="cardio">Cardiologist(కార్డియాలజిస్ట్)</option>
                            <option value="ortho">Orthopedist(ఆర్థోపెడిస్ట్)</option>
                        </select>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="date">Appointment Date-తేదీ</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="time">Preferred Time-కోరుకున్న సమయం</label>
                        <select id="time" class="form-control" required>
                            <option value="">Select Time Slot-టైమ్ స్లాట్ ఎంచుకోండి</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                            <option value="05:00 PM">05:00 PM</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="reason">Reason for Visit-ఎందుకు వస్తున్నారు</label>
                <textarea id="reason" class="form-control" rows="3" placeholder="Briefly describe(మీ లక్షణాలు/కారణం వివరించండి)"></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn" id="appointmentBtn"><span><i class="fas fa-calendar-check"></i>Book Appointment(బుక్ చేయండి)</span></button>
            </div>
        </form>
    </div>
</div>
</main>

<!-- Appointment Success Animation Popup -->
<div id="appointmentSuccess">
    <div class="success-content">
        <div class="success-checkmark">
            <svg viewBox="0 0 80 80">
                <circle class="circle" cx="40" cy="40" r="35"/>
                <polyline class="check" points="25,43 37,55 57,30"/>
            </svg>
        </div>
        <h2>Appointment Booked!</h2>
        <p id="successToken"></p>
    </div>
</div>

<!-- 3D Animated Payment Popup -->
<div class="modal" id="paymentModal">
    <div class="modal-content-3d" id="modal3d">
        <div class="modal-front">
            <h3>Payment Method (చెల్లింపు పద్ధతిని)</h3>
            <button class="modal-btn pay-hospital" id="payHospital">Pay at Hospital-హాస్పిటల్ లో చెల్లించండి</button>
            <button class="modal-btn pay-online" id="payOnline">PhonePe / GPay</button>
            <button class="modal-btn" id="closeModal">Cancel(రద్దు చేయండి)</button>
        </div>
        <div class="modal-back">
            <h3 id="backMessage">Message here</h3>
            <button class="modal-btn" id="backClose">Close(రద్దు చేయండి)</button>
        </div>
    </div>
</div>

<style>
/* 3D Modal Styles */
.modal-content-3d {
    perspective: 1000px;
    width: 90%;
    max-width: 400px;
    margin: 15% auto;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.77,0,.18,1);
}
.modal-front, .modal-back {
    position: absolute;
    width: 100%;
    backface-visibility: hidden;
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    animation: modalPop 0.7s cubic-bezier(.77,0,.18,1) backwards;
}
@keyframes modalPop {
    0% { opacity:0; transform: scale(0.9);}
    100% { opacity:1; transform: scale(1);}
}
.modal-back {
    transform: rotateY(180deg);
}
.modal-content-3d.show-back {
    transform: rotateY(180deg);
}
.modal .modal-btn {
    margin: 10px 0;
    padding: 12px 20px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
}
.pay-hospital { background: var(--secondary); color: #fff; }
.pay-online { background: var(--accent); color: #fff; }

/* Responsive for modal */
@media (max-width: 768px) {
    .modal-content-3d {
        max-width: 98vw;
        padding: 10px;
    }
    .modal-front, .modal-back {
        padding: 10px;
    }
}
@media (max-width: 480px) {
    .modal-content-3d {
        max-width: 99vw;
        padding: 5px;
    }
    .modal-front, .modal-back {
        padding: 5px;
    }
}
</style>
<script>
/* Advanced appointment animation logic */
document.addEventListener('DOMContentLoaded', function() {
    // Animate logo image
    const logoImg = document.querySelector('header img');
    if (logoImg) {
        logoImg.style.opacity = 0;
        setTimeout(() => {
            logoImg.style.transition = 'opacity 1.2s cubic-bezier(.77,0,.18,1)';
            logoImg.style.opacity = 1;
        }, 200);
    }

    // Animate form fields on focus
    document.querySelectorAll('.form-control').forEach(el => {
        el.addEventListener('focus', function() {
            this.parentElement.querySelector('label').style.color = 'var(--accent)';
        });
        el.addEventListener('blur', function() {
            this.parentElement.querySelector('label').style.color = 'var(--primary)';
        });
    });

    // Animate button on click
    const appointmentBtn = document.getElementById('appointmentBtn');
    if (appointmentBtn) {
        appointmentBtn.addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.97)';
        });
        appointmentBtn.addEventListener('mouseup', function() {
            this.style.transform = '';
        });
    }
});

// 3D popup logic
const modal3d = document.getElementById('modal3d');
const backMessage = document.getElementById('backMessage');

document.getElementById('backClose').addEventListener('click', function(){
    modal3d.classList.remove('show-back');
    document.getElementById('paymentModal').style.display = 'none';
});

document.getElementById('closeModal').addEventListener('click', function(){
    document.getElementById('paymentModal').style.display = 'none';
    modal3d.classList.remove('show-back');
});

// Token generation and management
let appointmentCounter = localStorage.getItem('appointmentCounter') || 0;

// Function to generate a unique token in KAMALA-OP(001) format
function generateToken() {
    appointmentCounter = parseInt(appointmentCounter) + 1;
    localStorage.setItem('appointmentCounter', appointmentCounter);
    const formattedNumber = appointmentCounter.toString().padStart(3, '0');
    return `KAMALA-OP(${formattedNumber})`;
}

// Function to reset counter at the start of each day
function checkAndResetCounter() {
    const today = new Date().toDateString();
    const lastReset = localStorage.getItem('lastResetDate');
    if (lastReset !== today) {
        localStorage.setItem('appointmentCounter', 0);
        localStorage.setItem('lastResetDate', today);
        appointmentCounter = 0;
    }
}

// ✅ Set min date
document.addEventListener('DOMContentLoaded', function() {
    // Use localhost for testing, production URL for live site
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        // If a local port is present (e.g., app served by a dev server), use same origin; otherwise default to 3000
        window.BACKEND_BASE = window.location.port ? window.location.origin : 'http://localhost:3000';
    } else {
        window.BACKEND_BASE = 'https://hospital-backend-78ur.onrender.com';
    }
    checkAndResetCounter();
    const today = new Date();
    const yyyy = today.getFullYear();
    let mm = today.getMonth() + 1;
    let dd = today.getDate();
    if(dd<10) dd='0'+dd;
    if(mm<10) mm='0'+mm;
    document.getElementById('date').setAttribute('min', `${yyyy}-${mm}-${dd}`);
});

// --- Modal Logic Rewrite ---

// 1. On form submit, show payment modal only (not success popup)
document.getElementById('appointmentForm').addEventListener('submit', function(e){
    e.preventDefault();

    const fullName = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const role = document.getElementById('role').value;
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const reason = document.getElementById('reason').value;

    if(!fullName || !phone || !age || !gender || !role || !date || !time){
        alert('Please fill all required fields(అన్ని వివరాలు సరైనదిగా నింపండి.)');
        return;
    }

    // Store patient phone for receipt lookup
    localStorage.setItem('patientPhone', phone);

    // Show payment method modal (first modal)
    document.getElementById('paymentModal').style.display = 'block';
});

// 2. Pay at Hospital: Hide payment modal, then show animated success popup, then redirect
document.getElementById('payHospital').addEventListener('click', async function(){
    // Hide payment modal immediately
    document.getElementById('paymentModal').style.display = 'none';
    
    // Wait a moment to ensure modal is fully hidden
    setTimeout(async () => {
        const token = generateToken();
        
        // Save appointment in backend with "Not Paid"
        const formData = {
            name: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            age: document.getElementById('age').value,
            gender: document.getElementById('gender').value,
            department: document.getElementById('role').value,
            appointmentDate: document.getElementById('date').value + " " + document.getElementById('time').value,
            reason: document.getElementById('reason').value,
            token: token,
            paymentStatus: "Pay at Hospital"
        };

        try {
            // Store data in localStorage for receipt page
            localStorage.setItem('appointmentData', JSON.stringify(formData));
            await fetch(`${window.BACKEND_BASE}/save-appointment-offline`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            });

            // Show animated success popup (second modal)
            const appointmentSuccess = document.getElementById('appointmentSuccess');
            const successToken = document.getElementById('successToken');
            successToken.textContent = 'Your Token: ' + token;
            appointmentSuccess.style.display = 'flex';
            setTimeout(() => {
                appointmentSuccess.style.opacity = 1;
            }, 10);
            setTimeout(() => {
                appointmentSuccess.style.opacity = 0;
                setTimeout(() => {
                    appointmentSuccess.style.display = 'none';
                    // Redirect after animation
            window.location.href = `receipt.html?token=${encodeURIComponent(token)}&status=PayAtHospital`;
                }, 600);
            }, 2200); // Show for 2.2s, then fade out and redirect

            // Optionally reset form
            document.getElementById('appointmentForm').reset();
        } catch (err) {
            alert("Error saving offline appointment");
        }
    }, 100); // Small delay to ensure modal is hidden
});

// 3. Pay Online (Cashfree): Hide payment modal, then proceed as before
document.getElementById('payOnline').addEventListener('click', async function(){
    // Hide payment modal
    document.getElementById('paymentModal').style.display = 'none';

    const token = generateToken();

    const formData = {
        name: document.getElementById('fullName').value,
        phone: document.getElementById('phone').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        department: document.getElementById('role').value,
        appointmentDate: document.getElementById('date').value + " " + document.getElementById('time').value,
        reason: document.getElementById('reason').value,
        token: token,
        paymentStatus: "Pending"
    };

    try {
        // Store data in localStorage as backup
        localStorage.setItem('appointmentData', JSON.stringify(formData));
        const res = await fetch(`${window.BACKEND_BASE}/generate-payment-link`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                ...formData,
                // Use current host for return if on localhost; otherwise use production domain
                redirect_url: (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? `${window.location.origin}/receipt.html?token=${encodeURIComponent(token)}&status=Paid`
                    : `https://srikamalahospital.store/receipt.html?token=${encodeURIComponent(token)}&status=Paid`
            })
        });

        let data = null;
        try { data = await res.json(); } catch (e) {}

        if (res.ok && data && data.link_url) {
            window.location.href = data.link_url; // Redirect to Cashfree
        } else {
            const reason = data && (data.message || data.details) ? `\n${data.message || ''}\n${typeof data.details === 'string' ? data.details : JSON.stringify(data.details || {})}` : '';
            alert("Failed to start payment. Please try again." + reason);
        }
    } catch (err) {
        console.error("Payment error:", err);
        alert("Error generating payment link. Please check your connection and try again.");
    }
});

// Close modal
document.getElementById('closeModal').addEventListener('click', function(){
    document.getElementById('paymentModal').style.display = 'none';
});
</script>

</body>
</html>
